name: Java CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      # 3. Build + Test + JAR
      - name: Build with Maven
        run: mvn clean install

      # 4. Copy JAR to EC2 ✅ (VERY IMPORTANT)
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/"
          strip_components: 1

      # 5. Deploy on EC2 ✅
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "Stopping old app"
            pkill -f 'DemoApp' || true

            echo "Starting new app"
            nohup java -jar /home/ubuntu/DemoApp-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            echo "Deployment completed 🚀"

      # 6. Success message
      - name: Deployed success message
        run: echo "Deployed successfully 🚀"